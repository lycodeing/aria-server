spring:
  application:
    name: aria-knowledge
  autoconfigure:
    exclude:
      # knowledge-service 本身不需要通过 SDK 调用自己，排除客户端自动装配
      - com.aria.sdk.knowledge.KnowledgeClientAutoConfig
  datasource:
    url: jdbc:postgresql://localhost:5432/aria_knowledge
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  # -------- RabbitMQ（文档摄取队列，替换原 Redis Streams） --------
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Publisher Confirms — Broker 持久化确认后才返回，保障发布端可靠性
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # 消费端重试 3 次失败后 nack(requeue=false) → DLX → DLQ
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aria.knowledge.infrastructure.persistence
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"

server:
  port: 8081

# Sa-Token（与 auth-service 共享 JWT 密钥，用于验证管理员 token）
sa-token:
  token-name: Authorization
  timeout: 28800
  token-prefix: "Bearer"
  is-read-header: true
  is-read-cookie: false
  jwt-secret-key: cs-auth-dev-secret-key-change-in-production

# auth-client SDK 配置（拉取 EMBEDDING 模型），共享密钥必须与 auth-service 一致
aria:
  auth:
    client:
      # base-url 本地开发默认值，生产由 application-prod.yml 覆盖
      base-url: http://localhost:8083
      # shared-secret 必填，未配置 SDK 启动即失败（fail-fast）
      shared-secret: aria-internal-lycodeing-2024
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
      max-retries: 2
  # 兼容 knowledge-service 内部其它调用继续读取此密钥
  internal:
    secret: aria-internal-lycodeing-2024

knowledge:
  search:
    # PostgreSQL 全文检索分词配置：
    #   simple — 内置，无需扩展，中文效果差（本地开发默认）
    #   jieba  — 需安装 pg_jieba 扩展，中文分词效果好（生产推荐）
    # 生产环境通过 application-prod.yml 覆盖为 jieba
    fts-config: simple
  # 文档摄取 MQ 配置（RabbitMQ，替换原 Redis Streams 摄取队列）
  ingest:
    exchange: knowledge.doc.ingest
    queue: knowledge.doc.ingest.queue
    dlq: knowledge.doc.ingest.dlq
    routing-key: ingest
    # 主队列消费线程数（同实例并发）
    consumer-concurrency: 2
    # DLQ 消费线程数，DLQ 量级低，单线程足够
    dlq-concurrency: 1
  chunk:
    max-tokens: 512
    overlap-tokens: 50
  embedding:
    # model / base-url / api-key 统一在 auth-service 后台管理（AI 模型配置 → EMBEDDING 类型）
    # 以下为运维调优参数，与模型配置无关
    batch-size: 32
    timeout-seconds: 30
  reranker:
    # 默认关闭，启用需在 application-prod.yml 中设置 enabled: true 及对应服务地址
    enabled: false
    base-url: http://localhost:8001
    model-name: bge-reranker-v2-m3
    timeout-seconds: 10

# -------- MinIO 对象存储配置 --------
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: ai-knowledge

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
  paths-to-exclude:
    - /internal/**

# =========================================================================
# Actuator 监控 — 仅暴露 /actuator/health 心跳接口，屏蔽其他端点
# =========================================================================
management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.aria: DEBUG
    org.springframework.data.redis: WARN

# -------- 天翼云 AI 配置（用于翻译等管理功能）--------
ctyun:
  ai:
    base-url: https://wishub-x6.ctyun.cn/v1
    api-key: ""
    model: DeepSeek-V4-Flash
