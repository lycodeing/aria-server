spring:
  application:
    name: aria-knowledge
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_knowledge
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  # -------- RabbitMQ（文档摄取队列，替换原 Redis Streams） --------
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Publisher Confirms — Broker 持久化确认后才返回，保障发布端可靠性
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # 消费端重试 3 次失败后 nack(requeue=false) → DLX → DLQ
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aria.knowledge.infrastructure.persistence
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"

server:
  port: 8084

# Sa-Token Redis Session 配置（与 auth-service 共享同一 Redis，直接验 token session）
sa-token:
  token-name: Authorization
  token-prefix: "Bearer"
  is-read-header: true
  is-read-cookie: false

knowledge:
  # 文档摄取 MQ 配置（RabbitMQ，替换原 Redis Streams）
  ingest:
    exchange: knowledge.doc.ingest
    queue: knowledge.doc.ingest.queue
    dlq: knowledge.doc.ingest.dlq
    routing-key: ingest
    # 主队列消费线程数（同实例并发）
    consumer-concurrency: 2
    # DLQ 消费线程数，DLQ 量级低，单线程足够
    dlq-concurrency: 1
  chunk:
    max-tokens: 512
    overlap-tokens: 50
  embedding:
    model: bge-m3
    base-url: ${EMBEDDING_BASE_URL:http://localhost:8000}
  reranker:
    # 默认关闭，启用需设置 RERANKER_ENABLED=true 及对应服务地址
    enabled: ${RERANKER_ENABLED:false}
    base-url: ${RERANKER_BASE_URL:http://localhost:8001}
    model-name: ${RERANKER_MODEL:bge-reranker-v2-m3}
    timeout-seconds: 10

# -------- MinIO 对象存储配置 --------
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:ai-knowledge}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
  paths-to-exclude:
    - /internal/**

logging:
  level:
    com.aria: DEBUG
    org.springframework.data.redis: WARN

# -------- 天翼云 AI 配置（用于翻译等管理功能）--------
ctyun:
  ai:
    base-url: ${CTYUN_AI_BASE_URL:https://wishub-x6.ctyun.cn/v1}
    api-key: ${AI_CTYUN_API_KEY:}
    model: DeepSeek-V4-Flash
