spring:
  application:
    name: knowledge-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_knowledge
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aidevplatform.knowledge.infrastructure.persistence
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"

server:
  port: 8081

knowledge:
  ingest:
    stream-key: knowledge:doc:ingest
    group-name: ingest-group
    dlq-key: knowledge:doc:ingest:dlq
    batch-size: 10
    max-retries: 3
    claim-idle-seconds: 60
  chunk:
    max-tokens: 512
    overlap-tokens: 50
  embedding:
    model: bge-m3
    base-url: ${EMBEDDING_BASE_URL:http://localhost:8000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
  paths-to-exclude:
    - /internal/**

logging:
  level:
    com.aidevplatform: DEBUG
    org.springframework.data.redis: WARN
