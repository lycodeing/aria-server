spring:
  application:
    name: aria-knowledge
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_knowledge
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  # -------- RabbitMQ（文档摄取队列，替换原 Redis Streams） --------
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Publisher Confirms — Broker 持久化确认后才返回，保障发布端可靠性
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # 消费端重试 3 次失败后 nack(requeue=false) → DLX → DLQ
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aria.knowledge.infrastructure.persistence
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"

server:
  port: 8084

# Sa-Token（与 auth-service 共享 JWT 密钥，用于验证管理员 token）
sa-token:
  token-name: Authorization
  timeout: 28800
  token-prefix: "Bearer"
  is-read-header: true
  is-read-cookie: false
  jwt-secret-key: ${JWT_SECRET_KEY:cs-auth-dev-secret-key-change-in-production}

# auth-client SDK 配置（拉取 EMBEDDING 模型），共享密钥必须与 auth-service 一致
aria:
  auth:
    client:
      # base-url 兼容旧变量 ARIA_AUTH_INTERNAL_URL
      base-url: ${ARIA_AUTH_URL:http://localhost:8083}
      # shared-secret 必填，未配置 SDK 启动即失败（fail-fast）
      shared-secret: ${ARIA_INTERNAL_SECRET:aria-internal-lycodeing-2024}
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
      max-retries: 2
  # 兼容 knowledge-service 内部其它调用继续读取此密钥
  internal:
    secret: ${ARIA_INTERNAL_SECRET:aria-internal-lycodeing-2024}

knowledge:
  search:
    # PostgreSQL 全文检索分词配置：
    #   simple — 内置，无需扩展，中文效果差（本地开发默认）
    #   jieba  — 需安装 pg_jieba 扩展，中文分词效果好（生产推荐）
    # 生产环境通过环境变量 PG_FTS_CONFIG=jieba 覆盖
    fts-config: ${PG_FTS_CONFIG:simple}
  # 文档摄取 MQ 配置（RabbitMQ，替换原 Redis Streams 摄取队列）
  ingest:
    exchange: knowledge.doc.ingest
    queue: knowledge.doc.ingest.queue
    dlq: knowledge.doc.ingest.dlq
    routing-key: ingest
    # 主队列消费线程数（同实例并发）
    consumer-concurrency: 2
    # DLQ 消费线程数，DLQ 量级低，单线程足够
    dlq-concurrency: 1
  chunk:
    max-tokens: 512
    overlap-tokens: 50
  embedding:
    # model / base-url / api-key 统一在 auth-service 后台管理（AI 模型配置 → EMBEDDING 类型）
    # 以下为运维调优参数，与模型配置无关
    batch-size: ${EMBEDDING_BATCH_SIZE:32}
    timeout-seconds: ${EMBEDDING_TIMEOUT:30}
  reranker:
    # 默认关闭，启用需设置 RERANKER_ENABLED=true 及对应服务地址
    enabled: ${RERANKER_ENABLED:false}
    base-url: ${RERANKER_BASE_URL:http://localhost:8001}
    model-name: ${RERANKER_MODEL:bge-reranker-v2-m3}
    timeout-seconds: 10

# -------- MinIO 对象存储配置 --------
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:ai-knowledge}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
  paths-to-exclude:
    - /internal/**

logging:
  level:
    com.aria: DEBUG
    org.springframework.data.redis: WARN

# -------- 天翼云 AI 配置（用于翻译等管理功能）--------
ctyun:
  ai:
    base-url: ${CTYUN_AI_BASE_URL:https://wishub-x6.ctyun.cn/v1}
    api-key: ${AI_CTYUN_API_KEY:}
    model: DeepSeek-V4-Flash
