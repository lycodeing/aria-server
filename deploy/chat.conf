upstream chat_frontend { server chat-frontend:8080; keepalive 16; }

upstream aria_auth { server ai-cs-auth:8083; keepalive 16; }
upstream aria_knowledge { server ai-cs-knowledge:8081; keepalive 16; }

# 对话服务多实例，ip_hash 保证 SSE 流式请求的会话粘滞
# 如需扩展到 3+ 台，在此追加 server 行并在 docker-compose.yml 中增加实例即可
upstream aria_conversation {
    ip_hash;
    server ai-cs-conversation-1:8082 max_fails=3 fail_timeout=30s;
    server ai-cs-conversation-2:8082 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chat.lycodeing.cn chat-api.lycodeing.cn;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# chat.lycodeing.cn
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name chat.lycodeing.cn;

    ssl_certificate     /etc/nginx/certs/lycodeing.cn/fullchain.cer;
    ssl_certificate_key /etc/nginx/certs/lycodeing.cn/lycodeing.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # -----------------------------------------------------------------
    # 认证服务：/auth/api/v1/xxx → strip /auth → proxy to auth-service
    # -----------------------------------------------------------------
    location /auth/ {
        proxy_pass http://aria_auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 10m;
    }

    # -----------------------------------------------------------------
    # 知识库服务：/knowledge/api/xxx → strip /knowledge → proxy to knowledge-service
    # -----------------------------------------------------------------
    location /knowledge/ {
        proxy_pass http://aria_knowledge/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 100m;
    }

    # -----------------------------------------------------------------
    # 对话服务：/conversation/api/v1/xxx → strip /conversation → proxy to conversation-service（SSE 优化）
    # -----------------------------------------------------------------
    location /conversation/ {
        proxy_pass http://aria_conversation/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 50m;
    }

    # -----------------------------------------------------------------
    # WebSocket（访客端 /ws/chat/* + 座席端 /ws/agent）
    # -----------------------------------------------------------------
    location /ws/ {
        proxy_pass http://aria_conversation;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接超时：WebSocket 空闲时不被 nginx 强制断开
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }


    # -----------------------------------------------------------------
    # 根路径 — API 网关信息（无前端时返回 JSON）
    # -----------------------------------------------------------------
    location = / {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"name":"ARIA API Gateway","status":"online","services":{"auth":"/auth/api/v1","knowledge":"/knowledge/api","conversation":"/conversation/api/v1"}}';
    }

    # -----------------------------------------------------------------
    # 前端静态资源
    # -----------------------------------------------------------------
    location / {
        proxy_pass http://chat_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        gzip on;
        gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    }
}

# chat-api.lycodeing.cn — 对话服务独立入口（SSE 优化，无 /conversation 前缀）
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name chat-api.lycodeing.cn;

    ssl_certificate     /etc/nginx/certs/lycodeing.cn/fullchain.cer;
    ssl_certificate_key /etc/nginx/certs/lycodeing.cn/lycodeing.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    gzip off;

    # WebSocket（访客端 /ws/chat/* + 座席端 /ws/agent）
    # 必须在 location / 之前匹配，否则兜底块会清掉 Upgrade 头导致握手失败
    location /ws/ {
        proxy_pass http://aria_conversation;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location / {
        proxy_pass http://aria_conversation;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 50m;
    }
}
