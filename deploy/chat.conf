upstream chat_frontend      { server chat-frontend:8080;      keepalive 16; }
upstream aria_auth           { server ai-cs-auth:8083;          keepalive 16; }
upstream aria_knowledge      { server ai-cs-knowledge:8081;     keepalive 16; }
upstream aria_conversation   { server ai-cs-conversation:8082;  keepalive 16; }

# HTTP -> HTTPS
server {
    listen 80;
    server_name chat.lycodeing.cn chat-api.lycodeing.cn;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# chat.lycodeing.cn — 前端 + 所有后端 API 统一入口
server {
    listen 443 ssl;
    http2 on;
    server_name chat.lycodeing.cn;

    ssl_certificate     /etc/nginx/certs/lycodeing.cn/fullchain.cer;
    ssl_certificate_key /etc/nginx/certs/lycodeing.cn/lycodeing.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # 认证服务
    location /api/v1/auth/ {
        proxy_pass http://aria_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 10m;
    }

    # 用户管理
    location /api/v1/users/ {
        proxy_pass http://aria_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 10m;
    }

    # 角色管理
    location /api/v1/roles/ {
        proxy_pass http://aria_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 知识库服务（实际路径前缀 /api/knowledge/）
    location /api/knowledge/ {
        proxy_pass http://aria_knowledge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 100m;
    }

    # 对话服务（SSE 优化）
    location /api/v1/chat/ {
        proxy_pass http://aria_conversation;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # 座席接口
    location /api/v1/sessions/ {
        proxy_pass http://aria_conversation;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # 访客接口
    location /api/v1/visitor/ {
        proxy_pass http://aria_conversation;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 前端静态资源
    location / {
        proxy_pass http://chat_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        gzip on;
        gzip_types text/plain text/css application/javascript application/json;
    }
}

# chat-api.lycodeing.cn — 对话服务独立入口（SSE 优化）
server {
    listen 443 ssl;
    http2 on;
    server_name chat-api.lycodeing.cn;

    ssl_certificate     /etc/nginx/certs/lycodeing.cn/fullchain.cer;
    ssl_certificate_key /etc/nginx/certs/lycodeing.cn/lycodeing.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    gzip off;

    location / {
        proxy_pass http://aria_conversation;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 50m;
    }
}
