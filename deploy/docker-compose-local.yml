# =============================================================================
# 本地 Docker Compose 编排 — 用于本地验证
# 使用方式：docker compose -f docker-compose-local.yml up -d
# =============================================================================
networks:
  ai-stack-net:
    external: true

volumes:
  redis_data:
  rabbitmq_data:
  minio_data:

services:

  # =========================================================================
  # 基础设施
  # =========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-cs-postgres
    restart: unless-stopped
    networks: [ai-stack-net]
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Lycodeing@2024
      POSTGRES_DB: aria_cs
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./docker-data/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-cs-redis
    restart: unless-stopped
    networks: [ai-stack-net]
    command: redis-server
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-cs-rabbitmq
    restart: unless-stopped
    networks: [ai-stack-net]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ai-cs-minio
    restart: unless-stopped
    networks: [ai-stack-net]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: Lycodeing@2024
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # =========================================================================
  # 业务服务
  # =========================================================================
  auth-service:
    image: eclipse-temurin:17-jre-jammy
    container_name: ai-cs-auth
    restart: unless-stopped
    networks: [ai-stack-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./docker-data/jars/aria-auth-1.0.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-XX:+UseContainerSupport", "-XX:MaxRAMPercentage=70.0", "-Djava.security.egd=file:/dev/./urandom", "-jar", "/app/app.jar"]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: postgres
      DB_PASSWORD: Lycodeing@2024
      REDIS_HOST: ai-cs-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null --connect-timeout 5 http://localhost:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  knowledge-service:
    image: eclipse-temurin:17-jre-jammy
    container_name: ai-cs-knowledge
    restart: unless-stopped
    networks: [ai-stack-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./docker-data/jars/aria-knowledge-1.0.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-XX:+UseContainerSupport", "-XX:MaxRAMPercentage=70.0", "-Djava.security.egd=file:/dev/./urandom", "-jar", "/app/app.jar"]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: postgres
      DB_PASSWORD: Lycodeing@2024
      REDIS_HOST: ai-cs-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      RABBITMQ_HOST: ai-cs-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null --connect-timeout 5 http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =========================================================================
  # 对话服务 — 多实例
  # =========================================================================
  conversation-service-1:
    image: eclipse-temurin:17-jre-jammy
    container_name: ai-cs-conversation-1
    restart: unless-stopped
    networks: [ai-stack-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    volumes:
      - ./docker-data/jars/aria-conversation-1.0.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-XX:+UseContainerSupport", "-XX:MaxRAMPercentage=70.0", "-Djava.security.egd=file:/dev/./urandom", "-jar", "/app/app.jar"]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: postgres
      DB_PASSWORD: Lycodeing@2024
      REDIS_HOST: ai-cs-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      RABBITMQ_HOST: ai-cs-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # 本地联调：在 prod 基础上追加本地前端地址（prod 只有 https://chat.lycodeing.cn）
      APP_CORS_ALLOWED_ORIGINS: "https://chat.lycodeing.cn,http://localhost:5670,http://localhost:5173,http://localhost:5671"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null --connect-timeout 5 http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  conversation-service-2:
    image: eclipse-temurin:17-jre-jammy
    container_name: ai-cs-conversation-2
    restart: unless-stopped
    networks: [ai-stack-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    volumes:
      - ./docker-data/jars/aria-conversation-1.0.0-SNAPSHOT.jar:/app/app.jar:ro
    command: ["java", "-XX:+UseContainerSupport", "-XX:MaxRAMPercentage=70.0", "-Djava.security.egd=file:/dev/./urandom", "-jar", "/app/app.jar"]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: postgres
      DB_PASSWORD: Lycodeing@2024
      REDIS_HOST: ai-cs-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      RABBITMQ_HOST: ai-cs-rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # 本地联调：在 prod 基础上追加本地前端地址（prod 只有 https://chat.lycodeing.cn）
      APP_CORS_ALLOWED_ORIGINS: "https://chat.lycodeing.cn,http://localhost:5670,http://localhost:5173,http://localhost:5671"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null --connect-timeout 5 http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  # =========================================================================
  # Nginx 反向代理
  # =========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-cs-nginx
    restart: unless-stopped
    networks: [ai-stack-net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker-data/nginx/conf.d/chat-local.conf:/etc/nginx/conf.d/chat.conf:ro
      - ./docker-data/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker-data/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - auth-service
      - knowledge-service
      - conversation-service-1
      - conversation-service-2