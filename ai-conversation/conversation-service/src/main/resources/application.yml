server:
  port: 8082
  servlet:
    context-path: /
spring:
  application:
    name: aria-conversation

  # -------- 数据库（对话历史持久化） --------
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_customerservice
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  # -------- Redis --------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # -------- RabbitMQ（对话消息可靠持久化） --------
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # C1: Publisher Confirms — Broker 持久化确认后才返回，保障发布端可靠性
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # C2: 启用消费端重试，retry 耗尽后 nack(requeue=false) → DLX → DLQ
        # 不配置此项时默认 nack(requeue=true)，消息永远不进 DLQ，无限循环
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000

# -------- 天翼云 AI 配置（DeepSeek-V4-Flash） --------
ai:
  ctyun:
    base-url: https://wishub-x6.ctyun.cn/v1
    # 【安全】API Key 必须通过环境变量 AI_CTYUN_API_KEY 注入，未设置时应用拒绝启动
    api-key: ${AI_CTYUN_API_KEY}
    model: DeepSeek-V4-Flash
    timeout-seconds: 60

# -------- 对话 MQ 配置 --------
conversation:
  # 持久化队列（消息/会话生命周期写 DB）
  persist:
    exchange: cs.conversation
    queue: cs.conversation.persist
    dlq: cs.conversation.persist.dlq
    routing-key: persist
  # 事件广播（Fanout，实时推送给座席 SSE）
  events:
    exchange: cs.conversation.events

# -------- MyBatis-Plus --------
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    # 【强制】全局枚举处理器，使 @EnumValue 标注的枚举自动与 DB 列双向映射
    # 作用范围：ConversationEntity.status(SessionStatus) / ConversationMessageEntity.role(MessageRole)
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      schema: cs_conversation

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# -------- CORS 配置 --------
# 生产环境请通过环境变量 APP_CORS_ALLOWED_ORIGINS 设置实际前端域名，禁止通配符
app:
  cors:
    # 开发环境默认允许本地前端，生产必须替换
    # 开发期 web-antd 端口可能为 5666/5667/5668/5669/5670，全部放行；aria-web 开发端口 5173；生产必须替换为实际域名
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://chat.lycodeing.cn,http://localhost:5670,http://localhost:5671}

# -------- 访客身份验证配置 --------
visitor:
  auth:
    # 验证码有效期（分钟）
    code-ttl-minutes: 5
    # 同一手机号发送频率限制（秒）
    rate-limit-seconds: 60
    # 连续错误最大次数，超出后锁定 10 分钟
    max-attempts: 5

# aria-auth 服务地址与内部共享密钥（auth-client SDK 从此拉取激活 AI 模型配置）
aria:
  auth:
    client:
      # base-url 兼容旧变量 ARIA_AUTH_INTERNAL_URL
      base-url: ${ARIA_AUTH_URL:${ARIA_AUTH_INTERNAL_URL:http://localhost:8083}}
      # shared-secret 必填，未配置 SDK 启动即失败（fail-fast）
      shared-secret: ${ARIA_INTERNAL_SECRET:${INTERNAL_SECRET:}}
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
      max-retries: 2
  # 兼容 conversation-service 内部其它调用（如 KnowledgeClient）继续读取此密钥
  internal:
    secret: ${INTERNAL_SECRET:change-this-in-production}

# -------- 知识库检索配置（RAG） --------
knowledge:
  service:
    # knowledge-service 地址，生产通过环境变量 KNOWLEDGE_SERVICE_BASE_URL 覆盖
    base-url: ${KNOWLEDGE_SERVICE_BASE_URL:http://localhost:8084}
  search:
    # 默认知识库 ID，生产通过 KNOWLEDGE_DEFAULT_KB_ID 覆盖
    default-kb-id: ${KNOWLEDGE_DEFAULT_KB_ID:default}
    # 每次检索返回 top-K 条，注入 prompt
    top-k: 5
    # 检索超时（秒），超时后降级为纯 AI 回复
    timeout-seconds: 5

# -------- MCP（Model Context Protocol）工具服务端配置 --------
# servers 列表为空时 MCP 工具自动禁用，不影响域工具和内置工具正常运行
# 示例（取消注释并按实际填写）：
# mcp:
#   servers:
#     - key: my-tools
#       type: STDIO
#       command: ["/usr/bin/node", "/opt/my-mcp/index.js"]
#       enabled: true
#     - key: remote-tools
#       type: HTTP
#       url: http://localhost:3001/sse
#       enabled: false
mcp:
  servers: []

logging:
  level:
    # 生产环境通过环境变量 LOGGING_LEVEL_COM_AIDEVPLATFORM_CONVERSATION=DEBUG 开启详细日志
    com.aria.conversation: INFO
    org.springframework.web.reactive: WARN


# Sa-Token（与 auth-service 共享 JWT 密钥，用于验证座席 token）
sa-token:
  token-name: Authorization
  timeout: 28800
  token-prefix: "Bearer"
  is-read-header: true
  is-read-cookie: false
  jwt-secret-key: ${JWT_SECRET_KEY:cs-auth-dev-secret-key-change-in-production}