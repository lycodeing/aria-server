server:
  port: 8083

spring:
  application:
    name: aria-auth
  autoconfigure:
    # auth-service 不需要 KnowledgeClient（通过 LocalAiModelConfigProvider 直查数据库），
    # 排除自动装配避免因缺少 AK/SK 导致启动失败
    exclude: com.aria.sdk.knowledge.KnowledgeClientAutoConfig
  datasource:
    url: jdbc:postgresql://localhost:5432/aria_cs
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "null"

# Sa-Token Redis Session 配置（token 数据存 Redis，跨服务共享验证）
sa-token:
  token-name: Authorization
  timeout: 28800
  token-prefix: "Bearer"
  is-read-header: true
  is-read-cookie: false
  max-login-count: 5

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 客服认证服务自定义配置
cs:
  auth:
    default-avatar: "https://unpkg.com/@vbenjs/static-source@0.1.7/source/avatar-v2.webp"
    # 登录失败锁定策略
    max-fail-count: 5
    lock-duration-minutes: 30

# 内部服务间通信密钥（微服务间调用 /internal/** 接口时须在 X-Internal-Secret 头携带此值）
# 无默认值：INTERNAL_SECRET / ARIA_INTERNAL_SECRET 未设置时，
# InternalSecretVerifier.validateOnStartup() 会阻止服务启动。
aria:
  internal:
    secret: aria-internal-lycodeing-2024
  # auth-service 自身不需要通过 auth-client SDK 调用自己，
  # 关闭 auth-client 自动装配以避免自调自己与循环依赖。
  # LocalAiModelConfigProvider 会以 @Primary 提供本地实现直查数据库。
  auth:
    client:
      enabled: false

logging:
  level:
    com.aria.customerservice.auth: DEBUG
    org.springframework.web: INFO
